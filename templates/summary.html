{% extends 'base.html' %}

{% block title %}Summary — StudyZoneCodex{% endblock %}

{% block content %}

<div class="pg-label">AI Generated</div>
<h1 class="pg-title">Summary</h1>
<p class="pg-sub">Key concepts extracted from <strong style="color: var(--sakura)">{{ filename }}</strong></p>

<!-- NAVIGATION PILLS -->
<div class="page-nav">
  <a href="/upload" class="page-pill">Upload</a>
  <a href="/summary/{{ filename }}" class="page-pill active">Summary</a>
  <a href="/quiz/{{ filename }}" class="page-pill">Quiz</a>
  <a href="/chat/{{ filename }}" class="page-pill">Chat</a>
</div>

<!-- SUMMARY CARD -->
<div class="card" style="margin-bottom: 16px;">
  <div class="pg-label">Overview</div>
  <p style="font-size: 14px; color: var(--text2); line-height: 1.8; font-weight: 300;">
    {{ summary }}
  </p>
</div>

<!-- NOTES CARD -->
<div class="card">
  <div class="pg-label">Your Notes</div>
  <textarea 
    class="notes-area" 
    placeholder="Write your own notes here — key points, questions, reminders...
" 
    rows="6">
  </textarea>
  <button class="btn-primary" style="margin-top: 12px;">Save Notes</button>
</div>

{% endblock %}
